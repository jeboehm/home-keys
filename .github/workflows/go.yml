name: Go
on:
  pull_request:
    branches: ["main"]
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...
