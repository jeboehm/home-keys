<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home-keys</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col items-center justify-center gap-5 p-6">
  <div class="flex items-center gap-3 mb-2">
    <span class="text-4xl">🔑</span>
    <h1 class="text-3xl font-bold text-gray-800">home-keys</h1>
  </div>

  {{if not .HomeKeysEnabled}}
  <div class="w-full max-w-sm bg-yellow-50 border border-yellow-300 rounded-2xl px-6 py-5 text-center shadow">
    <p class="text-yellow-800 font-semibold text-lg mb-1">Not activated yet</p>
    <p class="text-yellow-700 text-sm">The door openers are currently not active. Please try again later.</p>
  </div>
  {{else}}

  {{if .Success}}
  <p class="text-green-700 bg-green-50 border border-green-200 rounded-lg px-4 py-2 font-medium">
    ✓ {{.Success}} has been opened.
  </p>
  {{end}}

  {{range .Doors}}
  <form method="POST" action="/open">
    <input type="hidden" name="door" value="{{.Key}}">
    <button
      type="submit"
      class="w-72 h-24 text-xl font-semibold bg-green-500 hover:bg-green-600 active:scale-95 text-white rounded-2xl shadow-lg transition select-none"
    >
      Open {{.Name}}
    </button>
  </form>
  {{end}}

  {{end}}

  <form method="POST" action="/logout" class="mt-6">
    <button type="submit" class="text-sm text-gray-400 hover:text-gray-600 underline transition">
      Logout
    </button>
  </form>
</body>
</html>
