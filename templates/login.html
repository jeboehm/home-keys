<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home-keys — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
    <div class="flex items-center gap-3 mb-6">
      <span class="text-3xl">🔑</span>
      <h1 class="text-2xl font-semibold text-gray-800">Door-Access</h1>
    </div>

    {{if .Error}}
    <p class="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-4">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/login">
      <label class="block text-sm font-medium text-gray-700 mb-1" for="code">Code</label>
      <input
        id="code"
        type="tel"
        name="code"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="one-time-code"
        autofocus
        class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4 text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        placeholder="••••"
      />
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold py-2.5 rounded-lg transition"
      >
        Login
      </button>
    </form>
  </div>
</body>
</html>
